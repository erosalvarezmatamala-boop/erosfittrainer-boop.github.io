  {name:"Diego F.",months:3,result:"−8 kg",text:"Lo mejor es que adapta el plan a tu vida. Trabajo muchas horas y siempre encontramos la manera de entrenar bien.",goal:"Pérdida de peso",avatar:"DF"},
  {name:"Sara G.",months:5,result:"PR sentadilla",text:"Pasé de sentadillar 40 kg a 80 kg en 5 meses. Técnica impecable y programación muy seria.",goal:"Musculación",avatar:"SG"},

    {name:"Peso muerto rumano",sets:"3x10",rest:"90s",tip:"Bisagra de cadera pura, espalda neutra siempre",diff:"Intermedio"},

  ],

    {name:"Curl martillo",sets:"3x12",rest:"60s",tip:"Muñeca neutra, controla la bajada",diff:"Principiante"},
    {name:"Curl concentrado",sets:"3x12",rest:"45s",tip:"Apoya el codo en el muslo, nada de balanceo",diff:"Intermedio"},
  ],
  Tríceps:[
    {name:"Press francés con barra",sets:"4x10",rest:"75s",tip:"Codos apuntando al techo, sin abrirlos",diff:"Intermedio"},

    {name:"Fondos entre bancos",sets:"3x12",rest:"60s",tip:"Baja hasta 90° de codo para máximo estiramiento",diff:"Principiante"},
  ],
};
const pricing=[
  {id:"sesion",name:"Sesión individual",price:50,unit:"/ sesión",icon:"ti-bolt",features:["1 sesión de 60 min","Evaluación inicial gratuita","Plan de sesión personalizado","Seguimiento en app"],highlight:false},
  {id:"bono10",name:"Bono 10 sesiones",price:400,unit:"/ bono",badge:"Más popular",icon:"ti-rosette",features:["10 sesiones de 60 min","Ahorro de 100 €","Plan nutricional básico","Seguimiento completo","Acceso a biblioteca","Ajuste mensual de rutina"],highlight:true},
  {id:"mensual",name:"Plan mensual",price:250,unit:"/ mes",icon:"ti-calendar-month",features:["Sesiones ilimitadas","Plan nutricional completo","Rutinas personalizadas IA","Acceso 24/7 a la app","Soporte por WhatsApp","Revisión semanal"],highlight:false},

const ACCENT="#E8FF47",DARK="#0f0f0f",CARD_BG="#1a1a1a",CARD_BORDER="#2a2a2a",TEXT="#f5f5f5",MUTED="#888",HINT="#555";
const diffStyle={Principiante:{background:"#1a3a1a",color:"#6fcf6f"},Intermedio:{background:"#3a2e0a",color:"#f2c94c"},Avanzado:{background:"#3a1010",color:"#eb5757"}};

function App(){
  const [page,setPage]=useState("Inicio");
  const [level,setLevel]=useState("principiante");
  const [goal,setGoal]=useState("Hipertrofia");
  const [daysAvail,setDaysAvail]=useState(3);
  const [aiResult,setAiResult]=useState(null);
  const [loadingAI,setLoadingAI]=useState(false);
  const [filter,setFilter]=useState("Pecho");
  const [tIdx,setTIdx]=useState(0);
  const [sessions,setSessions]=useState([
    {date:"20 May",kg:80},{date:"22 May",kg:82.5},{date:"24 May",kg:82.5},{date:"26 May",kg:85},{date:"28 May",kg:87.5},
  ]);
  const [newKg,setNewKg]=useState("");
  const [newReps,setNewReps]=useState("");
  const [contactForm,setContactForm]=useState({nombre:"",email:"",mensaje:""});
  const [sent,setSent]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);

  useEffect(()=>{
    const t=setInterval(()=>setTIdx(i=>(i+1)%testimonials.length),4000);
    return()=>clearInterval(t);
  },[]);

  async function generatePlan(){
    setLoadingAI(true);setAiResult(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:`Eres Eros Álvarez, entrenador personal experto. Genera plan semanal: Nivel: ${level}, Objetivo: ${goal}, Días: ${daysAvail}. Responde SOLO con JSON: {"titulo":"...","descripcion":"...","dias":[{"dia":"...","musculo":"...","ejercicios":["Ejercicio – series x reps"]}],"consejo":"..."}`}]
        })
      });
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      setAiResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch{setAiResult({error:true});}
    setLoadingAI(false);
  }

  function addSession(){
    if(!newKg)return;
    const d=new Date();
    setSessions(s=>[...s,{date:`${d.getDate()} ${d.toLocaleString("es",{month:"short"})}`,kg:parseFloat(newKg)}]);
    setNewKg("");setNewReps("");
  }

  const maxKg=Math.max(...sessions.map(s=>s.kg));
  const minKg=Math.min(...sessions.map(s=>s.kg));
  const cH=130,cW=500;
  const yP=kg=>cH-((kg-minKg+5)/(maxKg-minKg+10))*cH;

  const navigate=(p)=>{setPage(p);setMenuOpen(false);window.scrollTo(0,0);};

            <div key={s.n} style={{display:"flex",gap:14,padding:"14px 0",borderBottom:`1px solid ${CARD_BORDER}`}}>
              <span style={{fontSize:13,color:ACCENT,fontWeight:700,minWidth:26}}>{s.n}</span>

                <p style={{fontWeight:600,fontSize:14,margin:"0 0 4px"}}>{s.title}</p>

              </div>
            </div>
          ))}
        </div>}

        {/* RUTINAS */}
        {page==="Rutinas"&&<div style={{paddingTop:"1.75rem"}}>
          <div style={{borderRadius:12,overflow:"hidden",height:140,marginBottom:"1.5rem",position:"relative"}}>
            <img src={IMGS.squat} alt="Rutinas" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",padding:"1.5rem"}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px",color:"#fff"}}>Genera tu rutina con IA</h2>
                <p style={{fontSize:13,color:"rgba(255,255,255,0.65)",margin:0}}>Basada en el método de Eros. Personalizada para ti.</p>
              </div>
            </div>
          </div>
          <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:20}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              {[{label:"Nivel",val:level,set:setLevel,opts:["principiante","intermedio","avanzado"],labels:["Principiante","Intermedio","Avanzado"]},{label:"Objetivo",val:goal,set:setGoal,opts:["Hipertrofia","Fuerza","Pérdida de peso","Resistencia","Definición"],labels:["Hipertrofia","Fuerza","Pérdida de peso","Resistencia","Definición"]}].map(f=>(
                <div key={f.label}>
                  <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:6}}>{f.label}</label>

                </div>

            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:6}}>Días disponibles: <strong style={{color:ACCENT}}>{daysAvail}</strong></label>
              <input type="range" min={2} max={6} step={1} value={daysAvail} onChange={e=>setDaysAvail(+e.target.value)} style={{width:"100%",accentColor:ACCENT}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:HINT,marginTop:4}}><span>2 días</span><span>6 días</span></div>
            </div>
            <button className="accent-btn" onClick={generatePlan} disabled={loadingAI} style={{opacity:loadingAI?.6:1,cursor:loadingAI?"wait":"pointer",display:"flex",alignItems:"center",gap:8}}>
              {loadingAI?"Generando tu plan...":"Generar plan personalizado ↗"}
            </button>
          </div>
          {aiResult&&!aiResult.error&&(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:20}}>
              <h3 style={{fontWeight:700,fontSize:16,margin:"0 0 4px",color:ACCENT}}>{aiResult.titulo}</h3>
              <p style={{fontSize:13,color:MUTED,margin:"0 0 14px"}}>{aiResult.descripcion}</p>
              {aiResult.dias?.map((d,i)=>(
                <div key={i} style={{background:"#111",border:`1px solid ${CARD_BORDER}`,borderRadius:8,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontWeight:600,fontSize:14}}>{d.dia}</span>
                    <span style={{fontSize:11,color:ACCENT,background:"rgba(232,255,71,0.1)",borderRadius:20,padding:"2px 10px",border:"1px solid rgba(232,255,71,0.2)"}}>{d.musculo}</span>
                  </div>
                  <ul style={{margin:0,padding:"0 0 0 14px",display:"flex",flexDirection:"column",gap:4}}>
                    {d.ejercicios?.map((e,j)=><li key={j} style={{fontSize:13,color:MUTED}}>{e}</li>)}
                  </ul>
                </div>
              ))}
              {aiResult.consejo&&(
                <div style={{borderLeft:`2px solid ${ACCENT}`,paddingLeft:12,marginTop:12}}>
                  <p style={{fontSize:13,color:MUTED,margin:0}}><strong style={{color:ACCENT}}>Consejo de Eros:</strong> {aiResult.consejo}</p>
                </div>
              )}
            </div>
          )}
          {aiResult?.error&&<p style={{color:"#eb5757",fontSize:13}}>Error al generar el plan. Inténtalo de nuevo.</p>}
        </div>}

        {/* EJERCICIOS */}
        {page==="Ejercicios"&&<div style={{paddingTop:"1.75rem"}}>
          <div style={{borderRadius:12,overflow:"hidden",height:130,marginBottom:"1.5rem",position:"relative"}}>
            <img src={IMGS.bench} alt="Ejercicios" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",padding:"1.5rem"}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px",color:"#fff"}}>Biblioteca de ejercicios</h2>
                <p style={{fontSize:13,color:"rgba(255,255,255,0.65)",margin:0}}>Seleccionados y explicados por Eros.</p>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {Object.keys(exercises).map(m=>(
              <button key={m} className="pill-btn" onClick={()=>setFilter(m)} style={{background:filter===m?ACCENT:"#1a1a1a",color:filter===m?"#000":MUTED,border:`1px solid ${filter===m?ACCENT:CARD_BORDER}`,borderRadius:20,padding:"5px 14px",fontSize:13,cursor:"pointer",fontWeight:filter===m?700:400}}>{m}</button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {exercises[filter].map((ex,i)=>(
              <div key={i} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <p style={{fontWeight:600,fontSize:15,margin:0}}>{ex.name}</p>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontSize:11,background:"#222",border:`1px solid ${CARD_BORDER}`,borderRadius:20,padding:"2px 10px",color:MUTED}}>{ex.sets}</span>
                    <span style={{fontSize:11,borderRadius:20,padding:"2px 10px",...diffStyle[ex.diff]}}>{ex.diff}</span>
                  </div>
                </div>
                <span style={{fontSize:12,color:HINT}}>Descanso: {ex.rest}</span>
                <div style={{borderLeft:`2px solid ${ACCENT}`,paddingLeft:10,marginTop:8}}>
                  <p style={{fontSize:12,color:MUTED,margin:0,lineHeight:1.5}}>{ex.tip}</p>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* PROGRESO */}
        {page==="Progreso"&&<div style={{paddingTop:"1.75rem"}}>
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>Tu progreso</h2>
          <p style={{fontSize:14,color:MUTED,margin:"0 0 1.5rem"}}>Registra cada sesión y visualiza tu evolución.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"Mejor marca",val:`${maxKg} kg`},{label:"Sesiones",val:sessions.length},{label:"Progreso total",val:`+${(maxKg-sessions[0].kg).toFixed(1)} kg`}].map(s=>(
              <div key={s.label} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"12px 14px"}}>
                <p style={{fontSize:12,color:MUTED,margin:"0 0 4px"}}>{s.label}</p>
                <p style={{fontSize:22,fontWeight:700,margin:0,color:ACCENT}}>{s.val}</p>
              </div>
            ))}
          </div>
          <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:14}}>
            <p style={{fontSize:13,fontWeight:600,margin:"0 0 14px"}}>Evolución — press de banca (kg)</p>
            <svg viewBox={`0 0 ${cW} ${cH+30}`} style={{width:"100%",minWidth:280}}>
              {sessions.map((s,i)=>{
                const x=30+i*((cW-60)/(sessions.length-1));
                const y=yP(s.kg);
                return(
                  <g key={i}>
                    {i<sessions.length-1&&<line x1={x} y1={y} x2={30+(i+1)*((cW-60)/(sessions.length-1))} y2={yP(sessions[i+1].kg)} stroke={ACCENT} strokeWidth={2} strokeOpacity={0.6}/>}
                    <circle cx={x} cy={y} r={5} fill={ACCENT}/>
                    <text x={x} y={y-9} textAnchor="middle" fontSize={11} fill={ACCENT}>{s.kg}</text>
                    <text x={x} y={cH+22} textAnchor="middle" fontSize={11} fill={HINT}>{s.date}</text>
                  </g>
                );
              })}
            </svg>
          </div>
          <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem"}}>
            <p style={{fontSize:13,fontWeight:600,margin:"0 0 12px"}}>Añadir sesión</p>
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <div style={{flex:1}}>
                <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:5}}>Peso (kg)</label>
                <input type="number" value={newKg} onChange={e=>setNewKg(e.target.value)} placeholder="87.5" style={{...inp}}/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:5}}>Reps</label>
                <input type="number" value={newReps} onChange={e=>setNewReps(e.target.value)} placeholder="8" style={{...inp}}/>
              </div>
              <button className="accent-btn" onClick={addSession} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>+ Añadir</button>
            </div>
          </div>
        </div>}

        {/* PRECIOS */}
        {page==="Precios"&&<div style={{paddingTop:"1.75rem"}}>
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>Planes y precios</h2>
          <p style={{fontSize:14,color:MUTED,margin:"0 0 1.75rem"}}>Sesiones presenciales en Madrid con Eros Álvarez.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
            {pricing.map(p=>(
              <div key={p.id} style={{background:CARD_BG,border:p.highlight?`2px solid ${ACCENT}`:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem",display:"flex",flexDirection:"column"}}>
                {p.badge?<span style={{fontSize:11,background:"rgba(232,255,71,0.15)",color:ACCENT,borderRadius:20,padding:"3px 10px",display:"inline-block",marginBottom:10,alignSelf:"flex-start",border:"1px solid rgba(232,255,71,0.3)"}}>{p.badge}</span>:<div style={{height:27}}/>}
                <i className={`ti ${p.icon}`} style={{fontSize:22,marginBottom:8,color:p.highlight?ACCENT:MUTED}}/>
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 4px"}}>{p.name}</p>
                <div style={{display:"flex",alignItems:"baseline",gap:4,margin:"8px 0 14px"}}>
                  <span style={{fontSize:28,fontWeight:700,color:p.highlight?ACCENT:TEXT}}>{p.price} €</span>
                  <span style={{fontSize:13,color:MUTED}}>{p.unit}</span>
                </div>
                <ul style={{margin:0,padding:"0 0 0 16px",display:"flex",flexDirection:"column",gap:6,flex:1}}>
                  {p.features.map((f,i)=><li key={i} style={{fontSize:13,color:MUTED,lineHeight:1.5}}>{f}</li>)}
                </ul>
                <button className={p.highlight?"accent-btn":"ghost-btn"} onClick={()=>navigate("Contacto")} style={{marginTop:16,width:"100%",padding:"9px 0"}}>Reservar ahora</button>
              </div>
            ))}
          </div>
          <div style={{background:"linear-gradient(135deg,#1a1a0a,#0f1a0f)",border:"1px solid #2a2a15",borderRadius:12,padding:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <p style={{fontWeight:700,fontSize:15,margin:"0 0 4px",color:ACCENT}}>Primera sesión gratuita</p>
              <p style={{fontSize:13,color:MUTED,margin:0}}>Sin compromiso. Evaluación completa y plan de acción.</p>
            </div>
            <button className="accent-btn" onClick={()=>navigate("Contacto")}>Quiero mi sesión gratis</button>
          </div>
        </div>}

        {/* CONTACTO */}
        {page==="Contacto"&&<div style={{paddingTop:"1.75rem"}}>
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>Contacto</h2>
          <p style={{fontSize:14,color:MUTED,margin:"0 0 1.5rem"}}>¿Tienes dudas o quieres reservar tu sesión gratuita? Escríbeme.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[{icon:"ti-brand-whatsapp",label:"WhatsApp",val:"+34 671 172 345",sub:"Respuesta rápida"},{icon:"ti-mail",label:"Email",val:"erosalvarezmatamala@gmail.com",sub:"Para consultas"},{icon:"ti-map-pin",label:"Ubicación",val:"Madrid Centro",sub:"Gimnasio concertado"},{icon:"ti-brand-instagram",label:"Instagram",val:"@eeross24._",sub:"Consejos diarios"}].map(c=>(
              <div key={c.label} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                <i className={`ti ${c.icon}`} style={{fontSize:20,color:ACCENT,marginTop:2,flexShrink:0}}/>
                <div>
                  <p style={{fontSize:11,color:HINT,margin:"0 0 2px"}}>{c.label}</p>
                  <p style={{fontWeight:600,fontSize:13,margin:"0 0 2px"}}>{c.val}</p>
                  <p style={{fontSize:12,color:MUTED,margin:0}}>{c.sub}</p>
                </div>
              </div>
            ))}
          </div>
          {!sent?(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem"}}>
              <p style={{fontWeight:600,fontSize:14,margin:"0 0 14px"}}>Enviar mensaje</p>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {[{label:"Nombre",key:"nombre",ph:"Tu nombre"},{label:"Email",key:"email",ph:"tu@email.com"}].map(f=>(
                  <div key={f.key}>
                    <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:5}}>{f.label}</label>
                    <input value={contactForm[f.key]} onChange={e=>setContactForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.ph} style={{...inp}}/>
                  </div>
                ))}
                <div>
                  <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:5}}>Mensaje</label>
                  <textarea value={contactForm.mensaje} onChange={e=>setContactForm(p=>({...p,mensaje:e.target.value}))} placeholder="Cuéntame tu objetivo..." rows={4} style={{...inp,resize:"vertical"}}/>
                </div>
                <button className="accent-btn" onClick={()=>setSent(true)} style={{alignSelf:"flex-start"}}>Enviar mensaje</button>
              </div>
            </div>
          ):(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"2rem",textAlign:"center"}}>
              <p style={{fontSize:40,margin:"0 0 12px"}}>✅</p>
              <p style={{fontWeight:700,fontSize:16,margin:"0 0 6px"}}>Mensaje enviado</p>
              <p style={{fontSize:14,color:MUTED,margin:"0 0 16px"}}>Eros te responderá en menos de 24 horas.</p>
              <button className="ghost-btn" onClick={()=>{setSent(false);setContactForm({nombre:"",email:"",mensaje:""});}}>Enviar otro mensaje</button>
            </div>
          )}
        </div>}
      </div>

      {/* FOOTER */}
      <div style={{marginTop:"3rem",borderTop:`1px solid ${CARD_BORDER}`,padding:"1.25rem 1.25rem 0.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <p style={{fontWeight:700,fontSize:14,margin:"0 0 3px",color:ACCENT}}>Eros Álvarez</p>
          <p style={{fontSize:12,color:MUTED,margin:0}}>Entrenador personal · Madrid</p>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
