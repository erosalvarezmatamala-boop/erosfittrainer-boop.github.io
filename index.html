                </div>
              ))}
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,color:MUTED,display:"block",marginBottom:6}}>Días: <strong style={{color:ACCENT}}>{daysAvail}</strong></label>
              <input type="range" min={2} max={6} step={1} value={daysAvail} onChange={e=>setDaysAvail(+e.target.value)} style={{width:"100%"}}/>
            </div>
            <button className="accent-btn" onClick={generatePlan} disabled={loadingAI} style={{width:"100%"}}>
              {loadingAI?"Generando...":"Generar plan"}
            </button>
          </div>
          {aiResult&&(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem"}}>
              <h3 style={{fontWeight:700,fontSize:16,margin:"0 0 1rem",color:ACCENT}}>{aiResult.titulo}</h3>
              {aiResult.dias?.map((d,i)=>(
                <div key={i} style={{background:"#111",border:`1px solid ${CARD_BORDER}`,borderRadius:8,padding:"12px",marginBottom:8}}>
                  <p style={{fontWeight:600,margin:"0 0 6px"}}>{d.dia} - {d.musculo}</p>
                  <ul style={{margin:0,padding:"0 0 0 16px",fontSize:13,color:MUTED}}>
                    {d.ejercicios?.map((e,j)=><li key={j}>{e}</li>)}
                  </ul>
                </div>
              ))}
              <p style={{fontSize:12,color:MUTED,marginTop:"1rem",borderLeft:`2px solid ${ACCENT}`,paddingLeft:10}}>💡 {aiResult.consejo}</p>
            </div>
          )}
        </div>}

        {/* EJERCICIOS */}
        {page==="Ejercicios"&&<div style={{paddingTop:"1.75rem"}} className="fade-in">
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 1.5rem"}}>Biblioteca de ejercicios</h2>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {Object.keys(exercises).map(m=>(
              <button key={m} onClick={()=>setFilter(m)} style={{background:filter===m?ACCENT:"#1a1a1a",color:filter===m?"#000":MUTED,border:"1px solid #333",borderRadius:20,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>
                {m}
              </button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {exercises[filter].map((ex,i)=>(
              <div key={i} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <p style={{fontWeight:600,margin:0}}>{ex.name}</p>
                  <span style={{fontSize:11,color:MUTED}}>{ex.sets}</span>
                </div>
                <p style={{fontSize:12,color:MUTED,margin:0,borderLeft:`2px solid ${ACCENT}`,paddingLeft:8}}>{ex.tip}</p>
              </div>
            ))}
          </div>
        </div>}

        {/* PROGRESO */}
        {page==="Progreso"&&<div style={{paddingTop:"1.75rem"}} className="fade-in">
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 1rem"}}>Tu progreso</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"Mejor",val:`${maxKg} kg`},{label:"Sesiones",val:sessions.length},{label:"Progreso",val:`+${(maxKg-sessions[0].kg).toFixed(1)} kg`}].map(s=>(
              <div key={s.label} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"12px"}}>
                <p style={{fontSize:11,color:MUTED,margin:"0 0 4px"}}>{s.label}</p>
                <p style={{fontSize:18,fontWeight:700,margin:0,color:ACCENT}}>{s.val}</p>
              </div>
            ))}
          </div>
          <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem"}}>
            <p style={{fontSize:13,fontWeight:600,margin:"0 0 1rem"}}>Añadir sesión</p>
            <div style={{display:"flex",gap:10}}>
              <input type="number" value={newKg} onChange={e=>setNewKg(e.target.value)} placeholder="kg" style={{flex:1,...inp}}/>
              <button className="accent-btn" onClick={addSession}>+ Añadir</button>
            </div>
          </div>
        </div>}

        {/* PRECIOS */}
        {page==="Precios"&&<div style={{paddingTop:"1.75rem"}} className="fade-in">
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 1.5rem"}}>Planes y precios</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
            {pricing.map(p=>(
              <div key={p.id} style={{background:CARD_BG,border:p.highlight?`2px solid ${ACCENT}`:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem"}}>
                {p.badge&&<span style={{fontSize:11,color:ACCENT,display:"block",marginBottom:8}}>{p.badge}</span>}
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 8px"}}>{p.name}</p>
                <p style={{fontSize:24,fontWeight:700,margin:"0 0 1rem",color:ACCENT}}>{p.price}€</p>
                <ul style={{margin:0,padding:"0 0 0 16px",fontSize:12,color:MUTED,marginBottom:"1rem"}}>
                  {p.features.slice(0,3).map((f,i)=><li key={i}>{f}</li>)}
                </ul>
                <button className={p.highlight?"accent-btn":"ghost-btn"} onClick={()=>navigate("Contacto")} style={{width:"100%"}}>Reservar</button>
              </div>
            ))}
          </div>
          
          <h3 style={{fontSize:16,fontWeight:700,margin:"2rem 0 1rem"}}>Preguntas frecuentes</h3>
          {faqItems.map((item,i)=>(
            <div key={i} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"12px",marginBottom:8,cursor:"pointer"}} onClick={()=>setFaqOpen(faqOpen===i?null:i)}>
              <p style={{fontWeight:600,margin:0,display:"flex",justifyContent:"space-between"}}>{item.q} {faqOpen===i?"▼":"▶"}</p>
              {faqOpen===i&&<p style={{fontSize:12,color:MUTED,margin:"8px 0 0"}}>{item.a}</p>}
            </div>
          ))}
        </div>}

        {/* BLOG */}
        {page==="Blog"&&<div style={{paddingTop:"1.75rem"}} className="fade-in">
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 1.5rem"}}>Blog</h2>
          {!selectedPost?(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
              {blogPosts.map(post=>(
                <div key={post.id} onClick={()=>setSelectedPost(post)} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,overflow:"hidden",cursor:"pointer"}}>
                  <img src={post.image} alt={post.title} style={{width:"100%",height:160,objectFit:"cover"}}/>
                  <div style={{padding:"1rem"}}>
                    <span style={{fontSize:11,color:ACCENT}}>{post.category}</span>
                    <h3 style={{fontSize:14,fontWeight:700,margin:"8px 0",color:TEXT}}>{post.title}</h3>
                    <p style={{fontSize:12,color:MUTED,margin:0}}>{post.date}</p>
                  </div>
                </div>
              ))}
            </div>
          ):(
            <div>
              <button className="ghost-btn" onClick={()=>setSelectedPost(null)}>← Volver</button>
              <article style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"2rem",maxWidth:"600px",margin:"1rem auto"}}>
                <img src={selectedPost.image} alt="" style={{width:"100%",height:300,objectFit:"cover",borderRadius:12,marginBottom:"1.5rem"}}/>
                <h1 style={{fontSize:24,fontWeight:700,marginBottom:"1rem"}}>{selectedPost.title}</h1>
                <p style={{fontSize:14,lineHeight:1.8,color:MUTED}}>{selectedPost.excerpt}</p>
              </article>
            </div>
          )}
        </div>}

        {/* CONTACTO */}
        {page==="Contacto"&&<div style={{paddingTop:"1.75rem"}} className="fade-in">
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 1rem"}}>Contacto</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[{label:"WhatsApp",val:"+34 671 172 345"},{label:"Email",val:"erosalvarezmatamala@gmail.com"}].map(c=>(
              <div key={c.label} style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:10,padding:"12px"}}>
                <p style={{fontSize:11,color:HINT,margin:"0 0 4px"}}>{c.label}</p>
                <p style={{fontWeight:600,margin:0,color:ACCENT}}>{c.val}</p>
              </div>
            ))}
          </div>
          {!sent?(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"1.25rem",maxWidth:"500px",margin:"0 auto"}}>
              <p style={{fontWeight:600,margin:"0 0 12px"}}>Enviar mensaje</p>
              {errorMsg&&<p style={{color:"#eb5757",fontSize:12,marginBottom:10}}>{errorMsg}</p>}
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <input value={contactForm.nombre} onChange={e=>setContactForm(p=>({...p,nombre:e.target.value}))} placeholder="Nombre" style={{...inp}}/>
                <input value={contactForm.email} onChange={e=>setContactForm(p=>({...p,email:e.target.value}))} placeholder="Email" style={{...inp}}/>
                <input value={contactForm.telefono} onChange={e=>setContactForm(p=>({...p,telefono:e.target.value}))} placeholder="Teléfono (opcional)" style={{...inp}}/>
                <textarea value={contactForm.mensaje} onChange={e=>setContactForm(p=>({...p,mensaje:e.target.value}))} placeholder="Tu mensaje..." rows={4} style={{...inp,resize:"vertical"}}/>
                <button className="accent-btn" onClick={sendContact} disabled={loading}>
                  {loading?"Enviando...":"Enviar"}
                </button>
              </div>
            </div>
          ):(
            <div style={{background:CARD_BG,border:`1px solid ${CARD_BORDER}`,borderRadius:12,padding:"2rem",textAlign:"center",maxWidth:"500px",margin:"0 auto"}}>
              <p style={{fontSize:40}}>✅</p>
              <p style={{fontWeight:700,fontSize:16}}>¡Mensaje enviado!</p>
              <p style={{fontSize:14,color:MUTED}}>Te responderemos en menos de 24h.</p>
              <button className="ghost-btn" onClick={()=>{setSent(false);setContactForm({nombre:"",email:"",mensaje:"",telefono:""});}} style={{marginTop:"1rem"}}>Nuevo mensaje</button>
            </div>
          )}
        </div>}
      </div>

      {/* FOOTER */}
      <div style={{marginTop:"3rem",borderTop:`1px solid ${CARD_BORDER}`,padding:"1.5rem 1.25rem 0.5rem",textAlign:"center"}}>
        <p style={{color:ACCENT,fontWeight:700,margin:"0 0 4px"}}>Eros Álvarez</p>
        <p style={{fontSize:12,color:MUTED,margin:0}}>Entrenador Personal · Madrid · © 2026</p>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
